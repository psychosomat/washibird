name: Create Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g., 1.3)'
        required: true
        type: string
      release_notes:
        description: 'Release notes (optional)'
        required: false
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update version in manifest.json
        run: |
          VERSION="${{ github.event.inputs.version }}"
          sed -i "s/\"version\": \".*\"/\"version\": \"$VERSION\"/" manifest.json
          echo "Updated version to $VERSION"
          cat manifest.json | grep version

      - name: Commit changes
        run: |
          VERSION="${{ github.event.inputs.version }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add manifest.json
          git commit -m "Release v$VERSION: Update version number"

      - name: Create tag
        run: |
          VERSION="${{ github.event.inputs.version }}"
          git tag -a "v$VERSION" -m "Release v$VERSION"

      - name: Push changes and tag
        run: |
          git push origin master
          git push origin "v$VERSION"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ github.event.inputs.version }}
          name: WashiBird v${{ github.event.inputs.version }}
          body: |
            ## What's Changed
            
            ${{ github.event.inputs.release_notes || 'See commit history for details.' }}
            
            ## Compatibility
            
            - Thunderbird: 128.0 to 150.*
            - Platforms: Windows, macOS, Linux
            
            ## Installation
            
            1. Set Thunderbird theme to Default Light or Default Dark
            2. Download the XPI file from the Assets section below
            3. Install the XPI file in Thunderbird (File → Install Add-on From File...)
            4. Go to Add-ons → WashiBird → Preferences to select your preferred theme mode
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
